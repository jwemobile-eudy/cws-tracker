    .card-hover{transition:transform .15s,box-shadow .15s;}
    .card-hover:hover{transform:translateY(-2px);}
    .expand-btn{transition:background .2s;}
    .expand-btn:hover{background:#0e2847 !important;}
    table{border-collapse:collapse;width:100%;}

const {useState, useEffect} = React;

function LiveDot() {
  return React.createElement('span', {style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#ff4444",animation:"pulse 1.2s infinite",marginRight:6,flexShrink:0}});
}

function ScoreCard({g}) {
  const isLive = g.status === "LIVE";
  const isToday = g.status === "TODAY";
  return (
    <div className="card-hover" style={{background:"linear-gradient(135deg,#0a1d35,#0e2847)",border:`1.5px solid ${isLive?O:"#1e3a5f"}`,borderRadius:14,padding:20,boxShadow:isLive?`0 0 24px ${O}44`:"0 4px 20px #00000066",animation:isLive?"glow 3s infinite":"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:isLive?O:isToday?"#5a8fd8":"#3a7a4a",display:"flex",alignItems:"center"}}>
          {isLive && <LiveDot/>}
          {isLive?`LIVE — ${g.inning}`:isToday?`TODAY • ${g.inning}`:"FINAL"}
        </span>
        <span style={{fontSize:10,color:"#3a5a7a",fontFamily:"monospace",letterSpacing:1}}>SUPER REGIONAL</span>
      </div>
      {[{t:g.t1,s:g.s1,opp:g.s2},{t:g.t2,s:g.s2,opp:g.s1}].map((row,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i===0?"1px solid #1a3050":"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:row.t==="Auburn"?O:"#162840",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚾</div>
            <span style={{color:"#e8eef8",fontWeight:row.t==="Auburn"?700:500,fontSize:15}}>{row.t}</span>
          </div>
          <span style={{fontFamily:"'Courier New',monospace",fontSize:30,fontWeight:700,color:row.s!=null?(row.s>row.opp?O:"#e8eef8"):"#2a4060"}}>
            {row.s!=null?row.s:"–"}
          </span>
        </div>
      ))}
    </div>
  );
}

function RegCard({reg}) {
  const [open,setOpen] = useState(false);
  const isAub = reg.host==="Auburn";
  return (
    <div style={{background:isAub?"linear-gradient(135deg,#142208,#0a1d35)":"linear-gradient(135deg,#07162b,#0a1d35)",border:`1.5px solid ${isAub?O:"#1e3a5f"}`,borderRadius:10,overflow:"hidden",boxShadow:isAub?`0 0 20px ${O}33`:"none"}}>
      <button className="expand-btn" onClick={()=>setOpen(!open)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{textAlign:"left"}}>
          <div style={{fontWeight:700,color:isAub?O:"#c8d8f0",fontSize:13}}>{isAub?"🐯 ":""}{reg.site}</div>
          <div style={{fontSize:11,color:"#4a6a8a",marginTop:3}}>Winner: <span style={{color:reg.winner?"#7ec8a0":"#3a5a7a",fontWeight:600}}>{reg.winner||"TBD"}</span></div>
        </div>
        <span style={{color:O,fontSize:20,display:"inline-block",transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .25s"}}>›</span>
      </button>
      {open && (
        <div style={{borderTop:"1px solid #1a3050",padding:"10px 16px 14px"}}>
          {reg.results.map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",padding:"5px 8px",borderRadius:6,background:"#091828",marginBottom:4,fontSize:12,gap:8}}>
              <span style={{color:"#3a5a7a",fontFamily:"monospace",width:20,flexShrink:0}}>G{i+1}</span>
              <span style={{flex:1,color:"#c8d8f0",textAlign:"left"}}>{m.t1}</span>
              <span style={{fontFamily:"monospace",color:O,fontSize:13,minWidth:44,textAlign:"center"}}>{m.s1}–{m.s2}</span>
              <span style={{flex:1,color:"#c8d8f0",textAlign:"right"}}>{m.t2}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SRCard({sr}) {
  const [open,setOpen] = useState(false);
  const isLive = sr.g2 && sr.g2.live;
  return (
    <div style={{background:"linear-gradient(135deg,#07162b,#0a1d35)",border:`1.5px solid ${isLive?O:"#1e3a5f"}`,borderRadius:10,overflow:"hidden",boxShadow:isLive?`0 0 16px ${O}44`:"none"}}>
      <button className="expand-btn" onClick={()=>setOpen(!open)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{textAlign:"left"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {isLive && <LiveDot/>}
            <span style={{color:"#c8d8f0",fontWeight:700,fontSize:13}}>{sr.t1} vs {sr.t2}</span>
          </div>
          <div style={{fontSize:11,color:"#4a6a8a",marginTop:3}}>
            {sr.winner?<span style={{color:"#7ec8a0",fontWeight:600}}>✓ {sr.winner} advances</span>
              :isLive?<span style={{color:O}}>Game 2 LIVE — {sr.g2.inning}</span>
              :<span>Game 2: {sr.g2.time||"TBD"}</span>}
          </div>
        </div>
        <span style={{color:O,fontSize:20,display:"inline-block",transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .25s"}}>›</span>
      </button>
      {open && (
        <div style={{borderTop:"1px solid #1a3050",padding:"10px 16px"}}>
          {[sr.g1,sr.g2].map((g,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i===0?"1px solid #1a3050":"none",fontSize:12}}>
              <span style={{color:"#3a5a7a"}}>Game {i+1}</span>
              <span style={{fontFamily:"monospace",color:"#c8d8f0"}}>
                {g.done?`${g.s1}–${g.s2}`:g.live?<span style={{color:O}}>LIVE {g.inning}</span>:g.time||"–"}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function LeaderRow({row,i}) {

        <div style={{fontSize:11,color:"#3a5a7a"}}>{row.team}</div>
      </div>
      <span style={{fontFamily:"'Courier New',monospace",fontSize:22,fontWeight:700,color:i===0?G:"#c8d8f0",flexShrink:0}}>{row.stat}</span>
    </div>

}

function App() {
  const [tab,setTab] = useState("scores");
  const [bTab,setBTab] = useState("regionals");
  const [lTab,setLTab] = useState("avg");
  const [countdown,setCountdown] = useState(60);
  const [lastRefresh,setLastRefresh] = useState(new Date());
  const [refreshing,setRefreshing] = useState(false);

  useEffect(()=>{
    const t = setInterval(()=>{
      if(document.visibilityState!=="visible") return;
      setCountdown(c=>{
        if(c<=1){
          setRefreshing(true);
          setTimeout(()=>{setRefreshing(false);setLastRefresh(new Date());},700);
          return 60;
        }
        return c-1;
      });
    },1000);
    return ()=>clearInterval(t);
  },[]);

  const navs = [{id:"scores",label:"⚾ Scores"},{id:"bracket",label:"🏆 Bracket"},{id:"leaders",label:"📊 Leaders"}];
  const btabs = [{id:"regionals",label:"Regionals (16)"},{id:"superreg",label:"Super Regionals"},{id:"omaha",label:"Omaha CWS"}];
  const ltabs = [{id:"avg",label:"AVG"},{id:"hr",label:"HR"},{id:"rbi",label:"RBI"},{id:"era",label:"ERA"},{id:"k",label:"K's"}];

  return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at top,#0d2440 0%,#050e1a 65%)"}}>

      <div style={{background:`linear-gradient(180deg,${N} 0%,#0a1d35 100%)`,borderBottom:`3px solid ${O}`,padding:"0 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1080,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 10px"}}>
            <div>
              <div style={{fontSize:10,letterSpacing:4,color:O,textTransform:"uppercase",fontWeight:700}}>2025</div>
              <div style={{fontSize:20,fontWeight:700,color:"#fff",lineHeight:1.15}}>College World Series</div>
              <div style={{fontSize:10,color:"#3a5a7a",letterSpacing:2}}>OMAHA, NEBRASKA</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{display:"flex",alignItems:"center",gap:7,justifyContent:"flex-end"}}>
                {refreshing
                  ? <span style={{fontSize:13,color:O,animation:"spin .7s linear infinite",display:"inline-block"}}>↻</span>
                  : <span style={{width:6,height:6,borderRadius:"50%",background:"#3a7a4a",display:"inline-block"}}/>
                }
                <span style={{fontSize:11,color:"#3a5a7a"}}>{refreshing?"Refreshing…":`Refresh in ${countdown}s`}</span>
              </div>
              <div style={{fontSize:10,color:"#1e3a5f",marginTop:3}}>
                Updated {lastRefresh.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {navs.map(n=>(
              <button key={n.id} className="nav-btn" onClick={()=>setTab(n.id)} style={{padding:"8px 18px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",background:tab===n.id?O:"transparent",color:tab===n.id?"#fff":"#4a6a8a",fontWeight:700,fontSize:13,fontFamily:"Georgia,serif"}}>
                {n.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1080,margin:"0 auto",padding:"24px 20px 60px"}}>

        {tab==="scores" && (
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18}}>
              <LiveDot/>
              <span style={{fontSize:14,fontWeight:700,color:O,letterSpacing:1,textTransform:"uppercase"}}>Super Regional — Games In Progress</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14,marginBottom:32}}>
              {LIVE_GAMES.map(g=><ScoreCard key={g.id} g={g}/>)}
            </div>
            <div style={{fontSize:11,color:"#3a5a7a",letterSpacing:3,textTransform:"uppercase",marginBottom:14}}>Super Regional — Game 1 Finals</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:10}}>
              {SUPER_REGIONALS.filter(sr=>sr.winner).map(sr=>(
                <div key={sr.id} className="card-hover" style={{background:"#07162b",border:"1px solid #1a3050",borderRadius:10,padding:"12px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:10,color:"#3a5a7a",letterSpacing:2}}>FINAL</span>
                    <span style={{fontSize:11,color:"#3a7a4a",fontWeight:600}}>✓ {sr.winner}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:"#c8d8f0",fontSize:13}}>{sr.t1}</span>
                    <span style={{fontFamily:"monospace",color:O,fontSize:17,fontWeight:700}}>{sr.g1.s1}–{sr.g1.s2}</span>
                    <span style={{color:"#c8d8f0",fontSize:13}}>{sr.t2}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="bracket" && (
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {btabs.map(bt=>(
                <button key={bt.id} onClick={()=>setBTab(bt.id)} style={{padding:"7px 16px",border:`1.5px solid ${bTab===bt.id?O:"#1e3a5f"}`,borderRadius:20,cursor:"pointer",background:bTab===bt.id?`${O}22`:"transparent",color:bTab===bt.id?O:"#4a6a8a",fontSize:12,fontWeight:600,fontFamily:"Georgia,serif"}}>
                  {bt.label}
                </button>
              ))}
            </div>
            {bTab==="regionals" && (
              <>
                <p style={{fontSize:12,color:"#3a5a7a",marginBottom:14}}>Tap any regional to expand game-by-game results ↓</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:10}}>
                  {REGIONALS.map(r=><RegCard key={r.id} reg={r}/>)}
                </div>
              </>
            )}
            {bTab==="superreg" && (
              <>
                <p style={{fontSize:12,color:"#3a5a7a",marginBottom:14}}>Best-of-3 series — tap to expand ↓</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:10}}>
                  {SUPER_REGIONALS.map(sr=><SRCard key={sr.id} sr={sr}/>)}
                </div>
              </>
            )}
            {bTab==="omaha" && (
              <div style={{background:"#07162b",borderRadius:14,border:"1px solid #1a3050",padding:20}}>
                <div style={{textAlign:"center",marginBottom:16,color:"#3a5a7a",fontSize:11,letterSpacing:3,textTransform:"uppercase"}}>Omaha — 2025 CWS Field (8 Teams)</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}}>
                  {OMAHA.map((t,i)=>(
                    <div key={i} className="card-hover" style={{background:t.name==="Auburn"?`linear-gradient(135deg,${O}33,#0a1d35)`:t.confirmed?"#0d2a12":"#0a1a2e",border:`1.5px solid ${t.name==="Auburn"?O:t.confirmed?"#3a7a4a":"#1a3050"}`,borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                      <div style={{fontSize:13,fontWeight:700,color:t.name==="Auburn"?O:t.confirmed?"#7ec8a0":"#2a4a6a"}}>
                        {t.name==="Auburn"?"🐯 ":""}{t.name}
                      </div>
                      {t.confirmed && <div style={{fontSize:9,color:"#3a7a4a",marginTop:4,letterSpacing:2}}>QUALIFIED</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="leaders" && (
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:13,fontWeight:700,color:O,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>Team Leaders</div>
            <div style={{overflowX:"auto",marginBottom:30,borderRadius:10,border:"1px solid #1a3050"}}>
              <table style={{minWidth:560}}>
                <thead>
                  <tr style={{background:"#091828"}}>
                    {["Team","Avg","ERA","Runs","HR","Wins"].map(h=>(
                      <th key={h} style={{padding:"10px 14px",textAlign:h==="Team"?"left":"center",color:"#3a5a7a",fontSize:10,letterSpacing:2,textTransform:"uppercase",fontWeight:600,borderBottom:`2px solid ${O}`}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {TEAM_STATS.map((row,i)=>(
                    <tr key={i} style={{background:row.team==="Auburn"?`${O}11`:i%2===0?"#07162b":"#091828",borderBottom:"1px solid #1a3050"}}>
                      <td style={{padding:"10px 14px",fontWeight:row.team==="Auburn"?700:400,color:row.team==="Auburn"?O:"#c8d8f0",fontSize:13}}>
                        {row.team==="Auburn"?"🐯 ":""}{row.team}
                      </td>
                      {[row.avg,row.era,row.runs,row.hr,row.wins].map((v,j)=>(
                        <td key={j} style={{padding:"10px 14px",textAlign:"center",fontFamily:"monospace",color:"#c8d8f0",fontSize:13}}>{v}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:O,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>Individual Leaders</div>
            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
              {ltabs.map(lt=>(
                <button key={lt.id} onClick={()=>setLTab(lt.id)} style={{padding:"6px 16px",border:`1.5px solid ${lTab===lt.id?O:"#1e3a5f"}`,borderRadius:20,cursor:"pointer",background:lTab===lt.id?O:"transparent",color:lTab===lt.id?"#fff":"#4a6a8a",fontSize:12,fontWeight:700,fontFamily:"monospace"}}>
                  {lt.label}
                </button>
              ))}
            </div>
            {IND[lTab].map((row,i)=><LeaderRow key={i} row={row} i={i}/>)}
          </div>
        )}
      </div>

      <div style={{borderTop:"1px solid #1a3050",padding:"14px 20px",textAlign:"center"}}>
        <span style={{fontSize:10,color:"#1e3a5f",letterSpacing:3}}>WAR EAGLE 🐯 • CWS TRACKER • OMAHA 2025</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
